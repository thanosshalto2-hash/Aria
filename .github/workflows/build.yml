name: Build ARIA APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Unzip
        run: unzip "ARIA-Android-Complete-2.zip"
      - name: Show structure
        run: find . -name "gradlew" 2>/dev/null && ls -la
      - name: Build
        run: |
          chmod +x ARIA-Android/gradlew
          cd ARIA-Android
          ./gradlew assembleDebug --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ARIA-APK
          path: "**/app-debug.apk"
