name: Build ARIA APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Unzip
        run: unzip "ARIA-Android-Complete-2.zip"
      - name: Build
        run: |
          FOLDER=$(find . -name "gradlew" -type f | head -1 | xargs dirname)
          echo "Found: $FOLDER"
          cd "$FOLDER"
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ARIA-APK
          path: "**/app-debug.apk"
