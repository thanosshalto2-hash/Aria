name: Build ARIA APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Unzip
        run: unzip "ARIA-Android-Complete-2.zip"
      - name: Install Gradle wrapper
        run: cd ARIA-Android && gradle wrapper --gradle-version 8.2
      - name: Build
        run: |
          cd ARIA-Android
          chmod +x gradlew
          ./gradlew assembleDebug 2>&1 | grep -E "error:|Error|FAILED|exception" | head -30
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ARIA-APK
          path: "**/app-debug.apk"
