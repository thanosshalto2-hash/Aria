name: Build ARIA APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Unzip project
        run: unzip ARIA-Android-Complete-2.zip
      - name: Build APK
        run: |
          cd ARIA-Android
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: ARIA-APK
          path: ARIA-Android/app/build/outputs/apk/debug/app-debug.apk
